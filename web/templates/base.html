{% load static %}
<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>{% block title %}VXcloud Guide{% endblock %}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="{% static 'site.css' %}" />
  <style>
    .app-layout { min-height: 100vh; display: grid; grid-template-columns: 260px 1fr; background: #f5f7fb; }
    .sidebar { background: #0f172a; color: #e2e8f0; padding: 20px 14px; border-right: 1px solid #1f2a44; }
    .sidebar .brand { display: block; color: #fff; text-decoration: none; font-weight: 700; font-size: 1.4rem; margin-bottom: 1rem; }
    .side-nav .side-link { display: block; color: #cbd5e1; text-decoration: none; padding: .55rem .7rem; border-radius: .6rem; margin-bottom: .35rem; }
    .side-nav .side-link:hover { background: #1e293b; color: #fff; }
    .content-area { padding: 20px; }
    .content-shell { max-width: 980px; }
    .section-card { background: #fff; border: 1px solid #e2e8f0; border-radius: 14px; padding: 18px; box-shadow: 0 4px 14px rgba(15, 23, 42, .05); }
    .alert-wrap .alert { margin-bottom: .5rem; }
    @media (max-width: 900px) {
      .app-layout { grid-template-columns: 1fr; }
      .content-area { padding: 12px; }
    }
  </style>
</head>
<body>
  <div class="app-layout">
    <aside class="sidebar">
      <a href="/" class="brand">VXcloud</a>
      <nav class="side-nav">
        <a href="/" class="side-link">Инструкции</a>
        <a href="/account/" class="side-link">Личный кабинет</a>
        <a href="/admin/" class="side-link">Админка</a>
      </nav>
    </aside>
    <main class="content-area">
      <div class="content-shell">
        {% if messages %}
          <section class="alert-wrap mb-2">
            {% for message in messages %}
              <div class="alert alert-info py-2">{{ message }}</div>
            {% endfor %}
          </section>
        {% endif %}
        {% block content %}{% endblock %}
      </div>
    </main>
  </div>
  <script>
    document.querySelectorAll('input, select, textarea').forEach((el) => {
      if (el.type === 'checkbox' || el.type === 'radio') return;
      el.classList.add('form-control');
    });
    document.querySelectorAll('button[type="submit"], button.btn').forEach((el) => {
      el.classList.add('btn', 'btn-primary');
    });
  </script>
</body>
</html>
