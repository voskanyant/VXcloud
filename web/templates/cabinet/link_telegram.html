{% extends 'base.html' %}

{% block title %}Привязка Telegram - VXcloud{% endblock %}

{% block content %}
<article class="section-card" style="max-width:560px;">
  <h1 class="h2 mb-3">Привязка Telegram</h1>
  <p class="text-secondary">Введите ваш Telegram ID из бота. После этого сайт покажет вашу подписку и конфиг.</p>
  <form method="post" class="vstack gap-3">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit">Привязать</button>
  </form>
</article>
{% endblock %}
