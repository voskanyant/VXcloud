{% extends 'base.html' %}

{% block title %}Регистрация - VXcloud{% endblock %}

{% block content %}
<article class="section-card" style="max-width:560px;">
  <h1 class="h2 mb-3">Регистрация</h1>
  <form method="post" class="vstack gap-3">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit">Создать аккаунт</button>
  </form>
  <p class="mt-3 mb-0">Уже есть аккаунт? <a href="/accounts/login/">Войти</a></p>
</article>
{% endblock %}
