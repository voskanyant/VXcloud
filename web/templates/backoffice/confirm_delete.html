{% extends "backoffice/base.html" %}

{% block content %}
<div class="card border-0 shadow-sm">
  <div class="card-body">
    <h2 class="h5 mb-3">Подтвердите удаление</h2>
    <p class="text-muted">Объект: <strong>{{ object }}</strong></p>
    <form method="post">
      {% csrf_token %}
      <div class="d-flex gap-2">
        <button type="submit" class="btn btn-danger">Удалить</button>
        <a href="javascript:history.back()" class="btn btn-outline-secondary">Отмена</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
