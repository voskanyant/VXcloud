{% load static %}
<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Вход в Backoffice · VXcloud</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="{% static 'backoffice/backoffice.css' %}">
</head>
<body class="bo-login-body">
  <div class="bo-login-card card shadow-sm border-0">
    <div class="card-body p-4 p-md-5">
      <h1 class="h3 mb-2">VXcloud Backoffice</h1>
      <p class="text-muted mb-4">Вход только для staff-пользователей</p>

      <form method="post" novalidate>
        {% csrf_token %}
        {% if form.non_field_errors %}
          <div class="alert alert-danger py-2">{{ form.non_field_errors }}</div>
        {% endif %}

        <div class="mb-3">
          <label for="id_username" class="form-label">Логин</label>
          <input type="text" name="username" id="id_username" class="form-control" required autofocus>
        </div>

        <div class="mb-3">
          <label for="id_password" class="form-label">Пароль</label>
          <input type="password" name="password" id="id_password" class="form-control" required>
        </div>

        {% if next %}
          <input type="hidden" name="next" value="{{ next }}">
        {% endif %}

        <button type="submit" class="btn btn-dark w-100">Войти</button>
      </form>
    </div>
  </div>
</body>
</html>
