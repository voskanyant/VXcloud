{% extends 'base.html' %}

{% block title %}Пароль обновлен - VXcloud{% endblock %}

{% block content %}
<section class="surface-card auth-shell site-auth-shell">
  <div class="account-eyebrow">Password reset</div>
  <h1 class="account-title-compact">Пароль обновлен</h1>
  <p class="account-subtle">Теперь вы можете <a class="account-inline-link" href="{% if account_embed_mode %}{{ account_embed_login_url }}{% else %}/accounts/login/{% endif %}">войти</a> с новым паролем.</p>
</section>
{% endblock %}
