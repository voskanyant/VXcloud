{% extends 'base.html' %}

{% block title %}Новый пароль - VXcloud{% endblock %}

{% block content %}
<section class="surface-card auth-shell site-auth-shell">
  <div class="account-eyebrow">Password reset</div>
  <h1 class="account-title-compact">Новый пароль</h1>
  {% if validlink %}
    <form method="post" class="auth-form">
      {% csrf_token %}
      {{ form.as_p }}
      <button type="submit" class="account-primary-button auth-submit">Сохранить пароль</button>
    </form>
  {% else %}
    <div class="account-message account-message-error">Ссылка недействительна или устарела. Запросите восстановление снова.</div>
  {% endif %}
</section>
{% endblock %}
