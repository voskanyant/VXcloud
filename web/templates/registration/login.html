{% extends 'base.html' %}

{% block title %}Вход - VXcloud{% endblock %}

{% block content %}
<article class="section-card" style="max-width:560px;">
  <h1 class="h2 mb-3">Вход</h1>
  <form method="post" class="vstack gap-3">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit">Войти</button>
  </form>
  <p class="mt-3 mb-0">Нет аккаунта? <a href="/account/signup/">Регистрация</a></p>
</article>
{% endblock %}
