{% extends 'base.html' %}

{% block title %}Восстановление пароля - VXcloud{% endblock %}

{% block content %}
<section class="surface-card auth-shell site-auth-shell">
  <div class="account-eyebrow">Password reset</div>
  <h1 class="account-title-compact">Восстановление пароля</h1>
  <p class="account-subtle">Введите email, указанный при регистрации. Мы отправим ссылку для сброса пароля.</p>
  <form method="post" class="auth-form">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit" class="account-primary-button auth-submit">Отправить ссылку</button>
  </form>
</section>
{% endblock %}
