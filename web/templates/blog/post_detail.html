{% extends 'base.html' %}

{% block title %}{{ post.title }} - VXcloud{% endblock %}

{% block content %}
<article class="section-card">
  <a href="/" class="btn btn-outline-secondary btn-sm mb-3">&larr; Все статьи</a>
  <h1 class="h2 mb-1">{{ post.title }}</h1>
  <small class="text-secondary">{{ post.published_at|date:'d.m.Y H:i' }}</small>
  <div class="mt-3">{{ post.content|linebreaks }}</div>
</article>
{% endblock %}
