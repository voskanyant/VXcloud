services:
  db:
    image: postgres:16-alpine
    container_name: vxcloud-db
    restart: unless-stopped
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    environment:
      POSTGRES_DB: vxcloud
      POSTGRES_USER: vxcloud
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - vxcloud_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vxcloud -d vxcloud"]
      interval: 10s
      timeout: 5s
      retries: 10

  wpdb:
    image: mariadb:11.4
    container_name: vxcloud-wpdb
    restart: unless-stopped
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    environment:
      MARIADB_DATABASE: ${WORDPRESS_DB_NAME}
      MARIADB_USER: ${WORDPRESS_DB_USER}
      MARIADB_PASSWORD: ${WORDPRESS_DB_PASSWORD}
      MARIADB_ROOT_PASSWORD: ${WORDPRESS_DB_ROOT_PASSWORD}
    volumes:
      - vxcloud_wpdb_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mariadb-admin ping -h 127.0.0.1 -u$$MARIADB_USER -p$$MARIADB_PASSWORD --silent"]
      interval: 10s
      timeout: 5s
      retries: 15

  wordpress:
    build:
      context: ./wordpress
    container_name: vxcloud-wordpress
    restart: unless-stopped
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    depends_on:
      wpdb:
        condition: service_healthy
    environment:
      WORDPRESS_DB_HOST: wpdb:3306
      WORDPRESS_DB_USER: ${WORDPRESS_DB_USER}
      WORDPRESS_DB_PASSWORD: ${WORDPRESS_DB_PASSWORD}
      WORDPRESS_DB_NAME: ${WORDPRESS_DB_NAME}
      WORDPRESS_PUBLIC_SITE_URL: ${WORDPRESS_PUBLIC_SITE_URL}
      WORDPRESS_TABLE_PREFIX: ${WORDPRESS_TABLE_PREFIX:-wp_}
      WORDPRESS_DEBUG: ${WORDPRESS_DEBUG:-0}
      WORDPRESS_CONFIG_EXTRA: |
        if (isset($$_SERVER['HTTP_X_FORWARDED_PROTO']) && strpos((string) $$_SERVER['HTTP_X_FORWARDED_PROTO'], 'https') !== false) {
          $$_SERVER['HTTPS'] = 'on';
        }
        define('FS_METHOD', 'direct');
        define('WP_HOME', getenv('WORDPRESS_PUBLIC_SITE_URL') ?: 'http://127.0.0.1:8088');
        define('WP_SITEURL', getenv('WORDPRESS_PUBLIC_SITE_URL') ?: 'http://127.0.0.1:8088');
        define('FORCE_SSL_ADMIN', strpos((string) getenv('WORDPRESS_PUBLIC_SITE_URL'), 'https://') === 0);
    volumes:
      - vxcloud_wordpress_data:/var/www/html
      - ./wordpress/wp-content/plugins/vx-site-integration:/var/www/html/wp-content/plugins/vx-site-integration
      - ./wordpress/wp-content/themes/vx-flatsome-child:/var/www/html/wp-content/themes/vx-flatsome-child
      - ./wordpress/import-data:/var/www/html/import-data

  web:
    build:
      context: .
    container_name: vxcloud-web
    restart: unless-stopped
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://vxcloud:${POSTGRES_PASSWORD}@db:5432/vxcloud
    depends_on:
      db:
        condition: service_healthy
    command: ["/app/scripts/docker/web-entrypoint.sh"]
    volumes:
      - ./web/staticfiles:/app/web/staticfiles
      - ./ops/haproxy/runtime:/app/ops/haproxy/runtime

  proxy:
    image: nginx:1.27-alpine
    container_name: vxcloud-proxy
    restart: unless-stopped
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    depends_on:
      - web
      - wordpress
    volumes:
      - ./ops/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "127.0.0.1:8088:80"

  haproxy:
    image: haproxy:lts-alpine
    container_name: vxcloud-haproxy
    restart: unless-stopped
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    network_mode: host
    depends_on:
      - web
    env_file:
      - .env
    environment:
      HAPROXY_PID_FILE: /tmp/haproxy.pid
    command: ["/bin/sh", "/usr/local/bin/haproxy-watch.sh"]
    volumes:
      - ./ops/haproxy/runtime:/usr/local/etc/haproxy/runtime
      - ./ops/haproxy/watch-and-run.sh:/usr/local/bin/haproxy-watch.sh:ro

  bot:
    build:
      context: .
    container_name: vxcloud-bot
    restart: unless-stopped
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://vxcloud:${POSTGRES_PASSWORD}@db:5432/vxcloud
    depends_on:
      db:
        condition: service_healthy
    command: ["/app/scripts/docker/bot-entrypoint.sh"]
    profiles:
      - bot

volumes:
  vxcloud_db_data:
  vxcloud_wpdb_data:
  vxcloud_wordpress_data:
