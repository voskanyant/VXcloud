name: Deploy VXcloud

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-vpnbot
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT }}
          script_stop: true
          script: |
            set -euo pipefail
            cd /opt/vpnbot
            git pull --ff-only origin main
            /opt/vpnbot/.venv/bin/pip install -r requirements.txt
            DATABASE_URL="$(grep -E '^DATABASE_URL=' /opt/vpnbot/.env | sed 's/^DATABASE_URL=//')"
            if [ -z "${DATABASE_URL}" ]; then
              echo "DATABASE_URL is missing in /opt/vpnbot/.env"
              exit 1
            fi
            psql "$DATABASE_URL" -f /opt/vpnbot/sql/schema.sql
            /opt/vpnbot/.venv/bin/python /opt/vpnbot/scripts/sync_directus.py \
              --env-file /opt/vpnbot/.env \
              --buttons-file /opt/vpnbot/directus_seed/bot_buttons.json \
              --content-file /opt/vpnbot/directus_seed/bot_content.json

            read_env() {
              /opt/vpnbot/.venv/bin/python - "$1" <<'PY'
import sys
from dotenv import dotenv_values
key = sys.argv[1]
value = dotenv_values("/opt/vpnbot/.env").get(key, "")
print(value if value is not None else "")
PY
            }

            DJANGO_DEBUG="$(read_env DJANGO_DEBUG)"
            DJANGO_ALLOWED_HOSTS="$(read_env DJANGO_ALLOWED_HOSTS)"
            DJANGO_CSRF_TRUSTED_ORIGINS="$(read_env DJANGO_CSRF_TRUSTED_ORIGINS)"
            TIMEZONE="$(read_env TIMEZONE)"

            DJANGO_DEBUG="$DJANGO_DEBUG" \
            DJANGO_ALLOWED_HOSTS="$DJANGO_ALLOWED_HOSTS" \
            DJANGO_CSRF_TRUSTED_ORIGINS="$DJANGO_CSRF_TRUSTED_ORIGINS" \
            DATABASE_URL="$DATABASE_URL" \
            TIMEZONE="$TIMEZONE" \
            /opt/vpnbot/.venv/bin/python /opt/vpnbot/web/manage.py migrate --settings=vxcloud_site.settings

            DJANGO_DEBUG="$DJANGO_DEBUG" \
            DJANGO_ALLOWED_HOSTS="$DJANGO_ALLOWED_HOSTS" \
            DJANGO_CSRF_TRUSTED_ORIGINS="$DJANGO_CSRF_TRUSTED_ORIGINS" \
            DATABASE_URL="$DATABASE_URL" \
            TIMEZONE="$TIMEZONE" \
            /opt/vpnbot/.venv/bin/python /opt/vpnbot/web/manage.py collectstatic --noinput --settings=vxcloud_site.settings

            if systemctl list-unit-files | grep -q '^vpnbot.service'; then
              systemctl restart vpnbot
            fi

            if systemctl list-unit-files | grep -q '^vxcloud-web.service'; then
              systemctl restart vxcloud-web
            fi

            if systemctl list-unit-files | grep -q '^nginx.service'; then
              systemctl restart nginx
            fi

            systemctl --no-pager --full status vpnbot | head -n 20 || true
            systemctl --no-pager --full status vxcloud-web | head -n 20 || true
            systemctl --no-pager --full status nginx | head -n 20 || true
