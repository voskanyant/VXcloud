name: Deploy VXcloud

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-vxcloud
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT }}
          script_stop: true
          script: |
            set -euo pipefail
            cd /srv/apps/vxcloud/app
            git fetch origin main
            git reset --hard origin/main
            if [[ ! -f .env && -f /srv/secrets/vxcloud.env ]]; then
              cp /srv/secrets/vxcloud.env .env
              chmod 600 .env
            fi

            docker compose --env-file .env build wordpress web bot
            docker compose --env-file .env up -d db wpdb
            docker compose --env-file .env run --rm --no-deps web python /app/web/manage.py makemigrations --check --dry-run

            docker compose --env-file .env up -d wordpress web
            docker compose --env-file .env stop haproxy || true
            docker compose --env-file .env --profile bot up -d bot
            docker compose --env-file .env up -d --force-recreate proxy

            if [[ "$(docker inspect -f '{{.State.Running}}' vxcloud-bot 2>/dev/null || true)" != "true" ]]; then
              echo "ERROR: bot container is not running"
              docker compose --env-file .env --profile bot ps
              docker compose --env-file .env --profile bot logs --tail=100 bot
              exit 1
            fi

            max_attempts=45
            healthy=0
            for attempt in $(seq 1 "$max_attempts"); do
              if curl -fsS -H 'Host: vxcloud.ru' -o /dev/null 'http://127.0.0.1:8088/ops/login/?next=/ops/'; then
                healthy=1
                break
              fi
              sleep 2
            done

            if [[ "$healthy" -ne 1 ]]; then
              echo "ERROR: local proxy healthcheck failed"
              docker compose --env-file .env ps
              docker compose --env-file .env --profile bot logs --tail=100 web bot proxy
              exit 1
            fi

            docker compose --env-file .env --profile bot ps
