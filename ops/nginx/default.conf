upstream vxcloud_django {
    server web:8088;
}

upstream vxcloud_wordpress {
    server wordpress:80;
}

server {
    listen 80;
    server_name _;
    client_max_body_size 32m;

    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host $host;

    location = /admin {
        return 301 /ops/;
    }

    location ^~ /admin/ {
        return 301 /ops/;
    }

    location ^~ /ops/ {
        proxy_pass http://vxcloud_django;
    }

    location ^~ /django-admin/ {
        proxy_pass http://vxcloud_django;
    }

    location ^~ /account/ {
        proxy_pass http://vxcloud_django;
    }

    location ^~ /accounts/ {
        proxy_pass http://vxcloud_django;
    }

    location ^~ /api/ {
        proxy_pass http://vxcloud_django;
    }

    location ^~ /auth/tg/ {
        proxy_pass http://vxcloud_django;
    }

    location ^~ /open-app/ {
        proxy_pass http://vxcloud_django;
    }

    location ^~ /legacy/ {
        proxy_pass http://vxcloud_django;
    }

    location ^~ /static/ {
        proxy_pass http://vxcloud_django;
    }

    location ^~ /wp-admin/ {
        proxy_pass http://vxcloud_wordpress;
    }

    location = /wp-login.php {
        proxy_pass http://vxcloud_wordpress;
    }

    location = /xmlrpc.php {
        proxy_pass http://vxcloud_wordpress;
    }

    location ^~ /wp-json/ {
        proxy_pass http://vxcloud_wordpress;
    }

    location ^~ /wp-content/ {
        proxy_pass http://vxcloud_wordpress;
    }

    location ^~ /wp-includes/ {
        proxy_pass http://vxcloud_wordpress;
    }

    location / {
        proxy_pass http://vxcloud_wordpress;
    }
}
